<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keychron K2 Product Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary-bg: #ffffff;
            --accent-color: #000000;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --bg-light: #f5f5f7;
            --border-color: #d2d2d7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            width: 95%;
            display: grid;
            grid-template-columns: 80px 1fr 380px; /* 3 Columns Layout */
            gap: 50px;
            align-items: center;
            padding: 40px 0;
        }

        /* 1. Left Thumbnails */
        .thumbnails {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .thumb {
            width: 70px;
            height: 70px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .thumb:hover, .thumb.active {
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }

        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* 2. Main Hero Image */
        .product-hero {
            display: flex;
            justify-content: center;
            position: relative;
        }

        .product-hero img {
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.1));
            transition: transform 0.5s ease;
        }

        .product-hero img:hover {
            transform: scale(1.02);
        }

        /* 3. Product Details (Right) */
        .details {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .category {
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            line-height: 1.1;
        }

        .price {
            font-size: 1.8rem;
            font-weight: 500;
            margin: 10px 0;
        }

        /* Option Selectors */
        .option-section {
            margin-top: 10px;
        }

        .option-title {
            display: block;
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .selectors {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        /* Colors */
        .color-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 0 0 1px var(--border-color);
            cursor: pointer;
            transition: 0.2s;
        }

        .color-dot.active {
            box-shadow: 0 0 0 2px var(--accent-color);
        }

        /* Chips (Switches) */
        .chip {
            padding: 10px 22px;
            border: 1px solid var(--border-color);
            border-radius: 25px;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .chip:hover {
            border-color: var(--accent-color);
        }

        .chip.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        /* Action Buttons */
        .actions {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-add {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .btn-add:hover {
            opacity: 0.85;
        }

        /* Responsive */
        @media (max-width: 992px) {
            .container {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 30px;
            }
            .thumbnails {
                flex-direction: row;
                justify-content: center;
                order: 2;
            }
            .product-hero { order: 1; }
            .details { order: 3; align-items: center; }
            .selectors { justify-content: center; }
        }
    </style>
</head>
<body>

    <main class="container">
        <div class="thumbnails">
            <div class="thumb active"><img src="https://via.placeholder.com/100" alt="view 1"></div>
            <div class="thumb"><img src="https://via.placeholder.com/100" alt="view 2"></div>
            <div class="thumb"><img src="https://via.placeholder.com/100" alt="view 3"></div>
        </div>

        <div class="product-hero">
            <img src="https://via.placeholder.com/600x400" alt="Keychron K2">
        </div>

        <section class="details">
            <span class="category">Mechanical Keyboard</span>
            <h1>The Keychron K2</h1>
            <p class="price">$120.00</p>

            <div class="option-section">
                <span class="option-title">Color Family</span>
                <div class="selectors">
                    <div class="color-dot active" style="background-color: #333;"></div>
                    <div class="color-dot" style="background-color: #e0e0e0;"></div>
                    <div class="color-dot" style="background-color: #8c715e;"></div>
                </div>

                <span class="option-title">Switch Type</span>
                <div class="selectors">
                    <button class="chip active">Red</button>
                    <button class="chip">Blue</button>
                    <button class="chip">Brown</button>
                </div>
            </div>

            <div class="actions">
                <button class="btn-add">Add to Cart</button>
            </div>
        </section>
    </main>

</body>
</html>
